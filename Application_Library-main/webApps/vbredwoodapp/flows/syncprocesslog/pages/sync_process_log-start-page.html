<div id="sampleDemo1" class="demo-padding demo-container">
  <div id="componentDemoContent1" style="width: 1px; min-width: 100%;">
    <div id="mainContent1">

      <oj-sp-smart-search-page page-title="Sync Process Log" id="oj_exssp1">

        <!--Search Section -->
        <oj-flex slot="search" class="oj-sm-padding-2x" style="align-items: center;">
          <div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-space-between"
            style="width: 100%; align-items: flex-start; padding: 0 1rem;">
            <div style="flex: 1; margin-right: 1rem;">
             <oj-sp-smart-search id="freq_smartsearch" filter-criterion="{{ $variables.filterCriterion }}"
        search-config="[[ $variables.searchConfiguration.provider]]" search-context="[[ $variables.searchContext ]]">
      </oj-sp-smart-search>
            </div>
            <div style="display: flex; gap: 0.25rem; margin-left: 1rem; margin-top: 1px; flex-wrap: wrap;">
              <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Reset" id="resetBtn"
                on-oj-action="[[$listeners.resetBtnAction]]"
               >
                <img slot="startIcon" :src="[[ $application.path + 'resources/images/Reset.png' ]]">
              </oj-button>
            </div>
          </div>
        </oj-flex>

        <!--Table Section -->
        <div id="sampleDemo" class="demo-padding demo-container">
          <div id="componentDemoContent" style="width: 1px; min-width: 100%;">
            <div id="searchMainContent">

              <div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-flex-end"
                style="width: 100%; padding: 0 1rem; background-color: white;">
                <div style="display: flex; gap: 0.25rem; margin-left: 1rem; margin-top: 1px; flex-wrap: wrap;">
                  <oj-button style="margin:0.125rem;" label="Refresh" chroming="outlined" id="refreshBtn"
                    on-oj-action="[[$listeners.refreshBtnAction]]"
                   >
                    <img slot="startIcon" :src="[[ $application.path + 'resources/images/Refresh.png' ]]">
                  </oj-button>
                 <oj-button style="margin:0.125rem;" label="Error Log Detail" chroming="outlined" id="refreshBtn"
                   on-oj-action="[[$listeners.refreshBtnAction2]]">
                   

               
                  </oj-button>
                    <oj-button style="margin:0.125rem;" label="Stop" chroming="outlined" id="refreshBtn"
                    
                   >
  <img slot="startIcon":src="[[ $flow.path + 'resources/images/no-stopping.png' ]]" width="20" height="20">
                   
                  </oj-button>
                </div>
              </div>
 


              <div class="oj-flex">
                <!-- oj-search-table -->
                <oj-table scroll-policy="loadMoreOnScroll" class="oj-sm-width-full oj-bg-body" display="grid"
                  horizontal-grid-visible="enabled" vertical-grid-visible="enabled" selection-mode.row="none"
                  selection-mode.column="none" id="searchErrorLogTbl"
                 columns="{{ $constants.tableColumns}}" data="[[ $variables.scheduleLogADP ]]">

                  <!-- Template Slots -->
                  <template slot="actions">
                    <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-center" style="gap:15px;">
                      <span class="oj-ux-ico-trash" style="cursor:pointer; font-size:20px;"
                        id="deleteIcon"></span>
                      <span class="oj-ux-ico-edit" style="cursor:pointer; font-size:20px;"
                        id="editIcon"></span>
                    </div>
                  </template>

                  <template slot="err_id">
                    <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
                  </template>

                  <template slot="table_name">
                    <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
                  </template>

              

                  <template slot="schedule_list_id">
                    <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
                  </template>
     <template slot="status">
                    <oj-bind-if test='[[ $current.data === "Y" ]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/activeBtn.png' ]]"
                        style="margin-left:35px;">
                    </oj-bind-if>
                    <oj-bind-if test='[[ $current.data === "N" ]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/inactive.png' ]]" style="margin-left:35px;">
                    </oj-bind-if>
                  </template>


                  <template slot="creation_date">
      <oj-input-date value='[[typeof $current.data === "string" ? $current.data : null]]' readonly="true"
        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yy"}}'></oj-input-date>
   </template>

                  <template slot="err_status">
                    <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
                  </template>

                </oj-table>
              </div>
            </div>
          </div>
        </div>

        <!-- Pagination Section -->
        <div class="oj-flex oj-sm-justify-content-center" style="background-color:white;">
          <oj-toolbar chroming="solid" class="oj-flex-item oj-sm-flex-initial">

            <oj-button label="Prev" chroming="borderless" disabled="[[ !$variables.pagingButton.previous ]]" id="preBtn"
              on-oj-action="[[$listeners.preBtnAction]]"
             >
              <span slot="startIcon" class="oj-ux-ico-back"></span>
            </oj-button>

            <oj-button label="Next" chroming="borderless" id="nxtBtn" 
              disabled="[[ !$variables.pagingButton.next ]]" on-oj-action="[[$listeners.nxtBtnAction]]">
              <span slot="endIcon" class="oj-ux-ico-forward-next"></span>
            </oj-button>

          </oj-toolbar>
        </div>

      </oj-sp-smart-search-page>
    </div>
  </div>
</div>
