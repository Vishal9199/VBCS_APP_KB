<div id="sampleDemo1" class="demo-padding demo-container">
<div id="componentDemoContent1" style="width: 1px; min-width: 100%;">
<div id="mainContent1">

<oj-sp-smart-search-page id="oj_exssp1" page-title="Role Management">

<!--Search Section -->
<oj-flex slot="search" class="oj-sm-padding-2x" style="align-items: center;">
  <div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-space-between" style="width: 100%; align-items: flex-start; padding: 0 1rem;">
    <div style="flex: 1; margin-right: 1rem;">
      <oj-sp-smart-search 
        id="freq_smartsearch"
        filter-criterion="{{ $variables.filterCriterion }}"
        search-config="[[ $variables.searchConfiguration.provider ]]" 
        search-context="[[ $variables.searchContext ]]">
      </oj-sp-smart-search>
    </div>
     <div style="display: flex; gap: 0.25rem; margin-left: 1rem; flex-wrap: wrap;">
              <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Reset" id="resetBtn"
                on-oj-action="[[$listeners.resetBtnAction]]">
                <img slot="startIcon" :src="[[ $application.path + 'resources/images/Reset.png' ]]">
              </oj-button>
            </div>
  </div>
</oj-flex>

<div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-flex-end"
  style=" width: 100%; align-items: flex-start; padding: 0 1rem; background-color:white; ">
  <div style="flex: 1; margin-right: 1rem ; background-color :white;">
  </div>
  <oj-button style="margin:0.125rem;" label="Refresh" chroming="outlined" id="refreshBtn"
    on-oj-action="[[$listeners.refreshBtnAction]]">
                    <img slot="startIcon" :src="[[ $application.path + 'resources/images/Refresh.png' ]]">
                  </oj-button>
  <div style="display: flex; gap: 0.25rem; margin-left: 1rem; margin-top: 1px; flex-wrap: wrap;">
    <oj-button style="margin:0.125rem;" label="Add" chroming="outlined" id="addBtn"
      on-oj-action="[[$listeners.addBtnAction]]"
    >
      <img slot="startIcon" :src="[[ $application.path + 'resources/images/Create (1).png' ]]">
    </oj-button>
  </div>

</div>

<div class="oj-flex">
<oj-table scroll-policy="loadMoreOnScroll" class="oj-sm-width-full oj-bg-body" display="grid"
  horizontal-grid-visible="enabled" vertical-grid-visible="enabled" selection-mode.row="single"
  selection-mode.column="single" id="searchRoleTbl" columns="{{$flow.constants.accessObj.allowDelete || $flow.constants.accessObj.allowEdit ? $constants.tableColumnsWithActions : $constants.tableColumns }}"
  data="[[ $variables.roleManagementADP ]]">

<!-- Actions Template Slot with Oracle JET Icons -->
<template slot="actions_template">
  <div style="gap:15px" class="oj-flex oj-sm-align-items-center oj-sm-justify-content-center">
    
 
    
    <oj-bind-if test="[[ $flow.constants.accessObj.allowDelete ]]">
      <span class="oj-ux-ico-trash" style="cursor: pointer;" on-click="[[$listeners.iconClick]]"></span>
    </oj-bind-if>

   
    <oj-bind-if test="[[ $flow.constants.accessObj.allowEdit ]]">
      <span class="oj-ux-ico-edit" style="cursor: pointer;" on-click="[[$listeners.iconClick2]]"></span>
    </oj-bind-if>

  </div>
</template>

<!-- Role ID Template -->
<template slot="role_id_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

<!-- Role Code Template -->
<template slot="role_code_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

<!-- Role Name Template -->
<template slot="role_name_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

<!-- Menu Name Template -->
<template slot="menu_name_template">
    <a style="font-weight: bold; color: #0572ce; text-decoration: underline; cursor: pointer;" target="_blank"
      on-click="[[$listeners.hyperlinkClick]]"
   >
    <oj-bind-text value="[[$current.data]]"></oj-bind-text>
  </a>
</template>

<!-- Request Group Template -->
<template slot="request_group_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

<!-- Application Name Template -->
<template slot="application_name_template">
    <a style="font-weight: bold; color: #0572ce; text-decoration: underline; cursor: pointer;" target="_blank"
      on-click="[[$listeners.hyperlinkClick2]]"
     
   >
    <oj-bind-text value="[[$current.data]]"></oj-bind-text>
  </a>
</template>

<!-- Business Unit Template -->
<template slot="business_unit_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

<!-- Active Flag Template -->
<template slot="active_flag_icon">
 <oj-bind-if test='[[ $current.data === "Y"  || $current.data === "y" || $current.data === true ]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/activeBtn.png' ]]" >

                    </oj-bind-if>
                    <oj-bind-if test='[[ $current.data === "N"  || $current.data === false]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/inactive.png' ]]" >
                    </oj-bind-if>
</template>

<!-- Remarks Template -->
<template slot="remarks_template">
  <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
</template>

</oj-table>
</div>

<!-- Pagination Section -->
<div class="oj-flex" style="background-color:white">
  <div class="oj-flex-item oj-sm-12 oj-md-1"></div>
  <div class="oj-flex-item oj-sm-12 oj-flex oj-md-6">
    <div class="oj-flex-item oj-sm-12 oj-md-8"></div>
    <div class="oj-flex oj-sm-justify-content-center">
      <oj-bind-if test="[[true]]">
        <oj-toolbar chroming="solid" class="oj-flex-item oj-sm-flex-initial">
          
          <!-- Previous Button -->
          <oj-button 
            label="Prev" 
            chroming="borderless"
            id="preBtn" 
            disabled="[[ !$variables.pagingButton.previous ]]" on-oj-action="[[$listeners.preBtnAction]]">
            <span slot="startIcon" class="oj-ux-ico-back"></span>
          </oj-button>
          
          <!-- Next Button -->
          <oj-button 
            label="Next" 
            chroming="borderless" 
            id="nxtBtn" 
            disabled="[[ !$variables.pagingButton.next ]]" on-oj-action="[[$listeners.nxtBtnAction]]">
            <span slot="endIcon" class="oj-ux-ico-forward-next"></span>
          </oj-button>
           
        </oj-toolbar>
      </oj-bind-if>
    </div>
  </div>
</div>

<!-- Delete Confirmation Dialog -->
<oj-dialog dialog-title="Delete Role" id="deleteDialog" cancel-behavior="icon">
  <div slot="body">
    <h6 id="deletehid" style="font-size:medium; font-weight: bold;">Are you sure you want to delete this role?</h6>
  </div>
  <div slot="footer">
    <oj-button id="deleteBtnYes" on-oj-action="[[$listeners.deleteBtnYesAction]]">Yes</oj-button>
    <oj-button id="deleteBtnNo" on-oj-action="[[$listeners.deleteBtnNoAction]]">No</oj-button>
  </div>
</oj-dialog>

</oj-sp-smart-search-page>
</div>
</div>
</div>
