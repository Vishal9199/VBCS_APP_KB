<div id="sampleDemo" style="" class="demo-padding demo-container">
  <div id="componentDemoContent" style="width: 1px; min-width: 100%;">
    <div id="mainContent">
      <div>
        <oj-sp-simple-create-edit id="oj_ssce1" page-title="User Access Management"
           display-options.responsive-padding="on"
          on-sp-cancel="[[$listeners.ojSsce1SpCancel]]" badge.status="info"
          badge.text="[[ $variables.userAccessDetailHeaderVar.user_name ]]">



          <div slot="main" style="padding-top: 0; margin-top: 0; background-color:white;">
            <div style="margin-top: 0;">

              <!-- Main Form Section - User Access Header -->
              <div class="oj-panel oj-panel-shadow-md oj-selected" style="margin-top: 0;">

                <div style="padding: 1rem;">
                  <oj-validation-group id="header-form-group" valid="{{ $variables.validform.isHeaderFormValid }}">
                    <oj-form-layout max-columns="2" label-edge="start" label-width="45%" colspan-wrap="wrap"
                      user-assistance-density="compact" direction="column">

                      <!-- User Name -->
                      <oj-input-text id="user-name" label-hint="User Name" placeholder="User Name"
                        value="{{ $variables.userAccessDetailHeaderVar.user_name }}" required="true"
                        style="width: 16rem;" readonly="true">
                      </oj-input-text>

                      <!-- Effective Start Date -->
                      <oj-input-date id="effective-start-date" label-hint="Effective Start Date"
                        value="{{ $variables.userAccessDetailHeaderVar.start_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}' style="width: 16rem;"
                        readonly="true">
                      </oj-input-date>

                      <!-- Effective End Date -->
                      <oj-input-date id="effective-end-date" label-hint="Effective End Date"
                        value="{{ $variables.userAccessDetailHeaderVar.end_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}' style="width: 16rem;"
                        readonly="true">
                      </oj-input-date>

                      <!-- Active Flag -->
                      <oj-switch id="active-flag" label-hint="Status"
                        value="{{ $variables.userAccessDetailHeaderVar.active_flag === 'Y' ? true : false }}"
                        style="width: 16rem;" on-value-changed="[[$listeners.activeFlagValue]]" disabled="true">
                      </oj-switch>

                    </oj-form-layout>
                  </oj-validation-group>
                </div>
              </div>

              <!-- User Access Details Table Section -->
              <div style="margin-top: 1.5rem;">

                <!-- Table Header with Title and Action Buttons -->
                <div class="oj-flex oj-sm-justify-content-space-between"
                  style="width: 100%; align-items: flex-start; padding: 0 1rem;">
                  <h6 style="color:#2B1675; margin-left:5px; margin-top:5px;">User Access Details</h6>
                  <div style="display: flex; gap: 0.25rem;">
                    <oj-button style="margin:0.125rem;" label="Add" chroming="outlined" id="addBtn"
                      on-oj-action="[[$listeners.addBtnAction]]">
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/Create (1).png' ]]">
                    </oj-button>
                    <oj-button style="margin:0.125rem;" label="Refresh" chroming="outlined" id="refreshBtn">
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/Refresh.png' ]]">


                    </oj-button>
                  </div>
                </div>

                <!-- User Access Details Table -->
                <oj-table id="user-access-details-table" data="{{ $variables.ADPuserAccessDetails }}"
                  columns="{{$flow.constants.accessObj.allowDelete || $flow.constants.accessObj.allowEdit ? $constants.tableColumnsWithActions : $constants.tableColumns}}"
                  columns-default.sortable="disabled" columns-default.resizable="enabled"
                  class="oj-sm-width-full oj-bg-body" display="grid" selection-mode.row="single"
                  style="margin-top: 1rem;">

                  <!-- Actions Template -->
                  <template slot="actions_template">
                    <div style="gap:15px" class="oj-flex oj-sm-align-items-center oj-sm-justify-content-center">
                
                        <oj-bind-if test="[[ $flow.constants.accessObj.allowDelete ]]">
                          <span class="oj-ux-ico-trash" id="trah" on-click="[[$listeners.trahClick]]"></span>
                        </oj-bind-if>
                    
                     
                        <oj-bind-if test="[[ $flow.constants.accessObj.allowEdit ]]">
                          <span class="oj-ux-ico-edit" id="edit" on-click="[[$listeners.editClick]]"></span>
                        </oj-bind-if>
                      
                    </div>
                  </template>

                  <!-- Active Flag Template -->
                  <template slot="active_flag_icon">
                    <oj-bind-if test='[[ $current.data === "Y"  || $current.data === "y" || $current.data === true ]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/activeBtn.png' ]]"
                        >
                    </oj-bind-if>
                    <oj-bind-if test='[[ $current.data === "N"  || $current.data === false]]'>
                      <img slot="startIcon" :src="[[ $application.path + 'resources/images/inactive.png' ]]"
                        >
                    </oj-bind-if>
                  </template>

                  <!-- Effective Start Date Template -->
                  <template slot="effective_start_date_template">
                    <oj-input-date value="[[ $current.data ]]" readonly="true"
                      converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                    </oj-input-date>
                  </template>

                  <!-- Effective End Date Template -->
                  <template slot="effective_end_date_template">
                    <oj-input-date value="[[ $current.data ]]" readonly="true"
                      converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                    </oj-input-date>
                  </template>

                  <!-- Remarks Template -->
                  <template slot="remarks_template">
                    <oj-bind-text value="[[ $current.data ]]"></oj-bind-text>
                  </template>

                
                      <template slot="role_name_template">
                        <a style="font-weight: bold; color: #0572ce; text-decoration: underline; cursor: pointer;"
                          target="_blank" on-click="[[$listeners.hyperlinkClick3]]">
                          <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                        </a>
                      </template>
          <template slot="application_name">
                        <a style="font-weight: bold; color: #0572ce; text-decoration: underline; cursor: pointer;"
                          target="_blank" on-click="[[$listeners.hyperlinkClick4]]" >
                          <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                        </a>
                      </template>

                </oj-table>



                <!-- Pagination Section -->
                <div class="oj-flex oj-sm-justify-content-center" style="margin-top: 1rem;">
                  <oj-bind-if test="[[ true ]]">
                    <oj-toolbar chroming="solid" class="oj-flex-item oj-sm-flex-initial">
                      <oj-button label="Previous" chroming="borderless" disabled="[[ !$variables.pagination.prev ]]"
                        id="prevBtn" on-oj-action="[[$listeners.prevBtnAction]]">
                        <span slot="startIcon" class="oj-ux-ico-back"></span>
                      </oj-button>
                      <oj-button label="Next" chroming="borderless" disabled="[[ !$variables.pagination.next ]]"
                        id="nextBtn" on-oj-action="[[$listeners.nextBtnAction]]">
                        <span slot="endIcon" class="oj-ux-ico-forward-next"></span>
                      </oj-button>
                    </oj-toolbar>
                  </oj-bind-if>
                </div>

              </div>

            </div>
          </div>

        </oj-sp-simple-create-edit>
      </div>
    </div>
  </div>
</div>




<!-- Delete Confirmation Dialog -->
<oj-dialog dialog-title="Delete Confirmation" id="deleteDialog" cancel-behavior="icon">
  <div slot="body">
    <h6 style="font-size:medium; font-weight: bold;">Are you sure you want to delete this user access record?</h6>
  </div>
  <div slot="footer">
    <oj-button id="deleteBtnYes" on-oj-action="[[$listeners.deleteBtnYesAction]]">Yes</oj-button>
    <oj-button id="deleteBtnNo" on-oj-action="[[$listeners.deleteBtnNoAction]]">No</oj-button>
  </div>
</oj-dialog>

<!-- Unsaved Changes Dialog -->
<oj-dialog dialog-title="Unsaved Changes" id="unsavedChangesDialog" cancel-behavior="icon">
  <div slot="body">
    <h6 style="font-size:medium; font-weight: bold;">You have unsaved changes. Do you want to leave this page?</h6>
  </div>
  <div slot="footer">
    <oj-button id="proceedExitBtn" chroming="outlined">Leave</oj-button>
    <oj-button id="cancelExitBtn" chroming="outlined">Cancel</oj-button>
  </div>
</oj-dialog>

<style>
  oj-button#oj_ssce1_h_primaryActionFromHeader_primaryActionCta {
    display: none !important;
  }

  .oj-dialog-body {
    position: relative;
    overflow: auto;
    box-sizing: border-box;
    padding: var(--oj-dialog-body-padding);
    /* width: 600px; */
    background-color: white !important;
  }  .oj-dialog-footer {
    background-color: white !important;
}
</style>


<!-- User Access Details Add/Edit Dialog -->
<oj-dialog id="userAccessDetailsDialog" dialog-title="User Access Details" cancel-behavior="icon" modality="modal"
  style="width:850px;" on-oj-close="[[$listeners.userAccessDetailsDialogClose]]">

  <!-- Dialog Body -->
  <div slot="body" class="dialog-body">
    <div class="oj-panel oj-selected" style="margin-top: 22px;">
      <oj-validation-group id="dialog-form-group" valid="{{ $variables.validform.isDialogFormValid}}">

        <div class="form-container">
          <oj-form-layout style="margin-right:10px" label-edge="start" columns="2" direction="column" max-columns="1"
            label-width="40%" user-assistance-density="compact" id="childform">

            <!-- User Name -->
            <!-- <oj-input-text 
              label-hint="User Name" 
              required="true"
              placeholder="User Name"
              value="{{ $variables.userAccessChildVar.user_name }}" readonly="true">
            </oj-input-text> -->

            <!-- Role Name Dropdown (Create Mode) -->
            <oj-bind-if test="[[ $variables.user_hide === 'create' ]]">
              <oj-select-single label-hint="Role Name" item-text="role_name"
                value="{{ $variables.userAccessChildVar.role_id }}" user-assistance-density="compact"
                on-value-item-changed="[[$listeners.selectValueItem]]" required="true"
                data="[[$variables.getAolUsrRoleLovRolenameListSDP2]]" id="role_name">

                <!-- Custom Collection Template with Table View -->
                <template slot="collectionTemplate" data-oj-as="collection">
                  <oj-table scroll-policy="loadMoreOnScroll" horizontal-grid-visible="enabled"
                    vertical-grid-visible="enabled" selection-mode='{"row": "single"}'
                    columns-default='{"resizable": "disabled", "sortable": "disabled"}' class="oj-select-results"
                    columns='[
                      {
                        "headerText": "Role Name",
                        "field": "role_name",
                        "template": "role_name_template"
                      },
                      {
                        "headerText": "Role Code",
                        "field": "role_code"
                      },
                      {
                        "headerText": "Application",
                        "field": "application_name"
                      }
                    ]' on-oj-row-action="[[collection.handleRowAction]]" data="[[collection.data]]"
                    selected.row="[[collection.selected]]" current-row="{{collection.currentRow}}" display="grid">

                    <!-- Template for Role Name Column (Clickable Link) -->
                    <template slot="role_name_template">
                      <a target="_blank" class="oj-link" on-click="[[$listeners.hyperlinkClick]]">
                        <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                      </a>
                    </template>

                  </oj-table>
                </template>

              </oj-select-single>
            </oj-bind-if>

            <!-- Application Name (Create Mode) -->
            <oj-bind-if test="[[ $variables.user_hide === 'create' ]]">
              <oj-input-text label-hint="Application Name" value="{{ $variables.userAccessChildVar.application_name }}"
                readonly="true" required="true" id="application_name"></oj-input-text>
            </oj-bind-if>

            <!-- Role Name (Edit Mode) -->
            <oj-bind-if test="[[ $variables.user_hide === 'hide' ]]">
              <oj-input-text label-hint="Role Name" value="{{ $variables.userAccessChildVar.role_name }}"
                readonly="true"></oj-input-text>
            </oj-bind-if>

            <!-- Application Name (Edit Mode) -->
            <oj-bind-if test="[[ $variables.user_hide === 'hide' ]]">
              <oj-input-text label-hint="Application Name" value="{{ $variables.userAccessChildVar.application_name }}"
                readonly="true"></oj-input-text>
            </oj-bind-if>

            <!-- Effective Start Date -->
            <oj-input-date label-hint="Effective Start Date"
              value="{{ $variables.userAccessChildVar.effective_start_date }}"
              converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'
              readonly="[[ $variables.user_hide ==='hide']]">
            </oj-input-date>

            <!-- Effective End Date -->
            <oj-input-date label-hint="Effective End Date"
              value="{{ $variables.userAccessChildVar.effective_end_date }}"
              converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'
              disabled="[[ $flow.variables.enddate ]]" min="[[ $variables.userAccessChildVar.effective_start_date ]]">
            </oj-input-date>

            <!-- Remarks -->
            <oj-text-area label-hint="Remarks" placeholder="Remarks" value="{{ $variables.userAccessChildVar.remarks }}"
              length.counter="remaining" length.max="250">
            </oj-text-area>

            <!-- Active Status -->
            <oj-switch value="{{ $variables.userAccessChildVar.active_flag === 'Y' ? true : false }}"
              label-hint="Status" on-value-changed="[[$listeners.switchValue]]">
            </oj-switch>

          </oj-form-layout>
        </div>

      </oj-validation-group>
    </div>
  </div>

  <!-- Dialog Footer -->
  <div slot="footer" class="dialog-footer" style="background-color:white;">
    <oj-button chroming="outlined" id="save-add-another" on-oj-action="[[$listeners.saveAddAnotherAction]]">
      Save & Add
    </oj-button>
    <oj-button chroming="outlined" id="save-close" on-oj-action="[[$listeners.saveCloseAction]]">
      Save & Close
    </oj-button>
    <oj-button chroming="outlined" id="cancel" on-oj-action="[[$listeners.cancelAction]]">
      Cancel
    </oj-button>
  </div>

</oj-dialog>
