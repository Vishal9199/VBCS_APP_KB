<style>

oj-option#project_list_edit_page_h_cancelAction
{
  display: none !important;
}

#budget-additional-info .oj-text-field-container {
    min-height: 6rem !important;
  }

/* Budget form validation message warning icon */
.oj-ux-ico-warning:before {
  content: '\f91a';
  color: #856404;
}

/* Budget form clear icon */
.oj-ux-ico-eraser:before {
  content: '\f332';
}

/* Budget form save icon */

} */

/* Budget table refresh icon */

  content: '\f32f';
}

.oj-ux-ico-edit:before {
  content: '\f61c';
}

/* Budget table delete icon */
.oj-ux-ico-trash:before {
  content: '\f358';
}

/* Custom button alignment for table actions */
.custom-button-align {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
}

/* Budget form container styling */
#cost-budget-section .oj-form-layout {
    margin-bottom: 0;
}

/* Budget form number inputs */

    font-size: 14px;
}

/* Budget table styling */

    border: 1px solid #dee2e6;
    border-radius: 4px;
}

/* Budget table header cells */
#budget-table .oj-table-column-header-cell {
    background-color: #084c4c;
    color: white;
    font-weight: bold;
}

/* Budget table row hover */
#budget-table .oj-table-data-row:hover {
    background-color: rgba(8, 76, 76, 0.05);

/* Validation message box */

    padding: 0.75rem;
    background-color: #fff3cd;
    border: 1px solid #ffc107;

    align-items: center;
    margin-bottom: 1rem;
}

/* Budget form help text */
oj-select-single[id="budget-calendar"] .oj-text-field-container {
    border-color: #084c4c;
}

/* Budget form disabled state */
oj-input-number:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Budget form validation group */
#budgetFormValidation {
    width: 100%;
}
