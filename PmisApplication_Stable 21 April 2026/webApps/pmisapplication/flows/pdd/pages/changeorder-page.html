<div id="sampleDemo" style="" class="demo-padding demo-container">
  <div id="componentDemoContent" style="width: 1px; min-width: 100%;">
    <div id="mainContent">
      <div>
        <oj-sp-advanced-create-edit id="crSearchPageid" page-title="Change Request page" page-subtitle=" "
          display-options.responsive-padding="on" primary-action.label="Close" secondary-actions='[]'
          on-sp-primary-action="[[$listeners.crSearchPageidSpPrimaryAction]]">

          <div slot="main" style="padding-top: 0; margin-top: 0.1rem; min-width: 100%;">
            <div style="margin-top: 0;">

              <!-- Project Details Section -->
              <oj-collapsible id="project-details-section" expanded="true"
                class="oj-panel oj-panel-shadow-md oj-selected" style="margin-top: 0;">
                <span slot="header" style="font-weight: bold; color: white;">Project Details</span>
                <div style="padding: 1rem;">
                  <oj-form-layout max-columns="3" label-edge="start" label-width="40%" colspan-wrap="wrap">

                    <oj-input-text id="projectName" label-hint="Project Name" placeholder="Project Name"
                      value="[[$variables.projectObj.project_name]]" user-assistance-density="compact"
                      style="width: 16rem;" disabled="true">
                    </oj-input-text>

                    <oj-input-text id="projectNumber" label-hint="Project Number" placeholder="Project Number"
                      value="[[$variables.projectObj.project_number]]" user-assistance-density="compact"
                      style="width: 16rem;" disabled="true">
                    </oj-input-text>

                    <oj-input-text id="tenderNumber" label-hint="Tender Number" placeholder="Tender Number"
                      value="[[$variables.projectObj.tender_number]]" user-assistance-density="compact"
                      style="width: 16rem;" disabled="true">
                    </oj-input-text>

                  </oj-form-layout>
                </div>
              </oj-collapsible>

              <!-- Change Request Table Section -->
              <!-- <oj-collapsible id="cr-table-section" expanded="true"
                class="oj-panel oj-panel-shadow-md oj-selected" style="margin-top: 1rem;"> -->
              <div class="oj-flex-bar-end oj-helper-justify-content-flex-end">
                      <oj-button style="margin:0.125rem;padding-top:5px;" chroming="outlined" class="oj-button-md"
                        label="Create" id="Create" on-oj-action="[[$listeners.createAction]]">
                        <span slot="startIcon" class="oj-ux-ico-plus"></span>
                      </oj-button>
                    </div>
              <!-- <div style="padding: 1rem;"> -->

              <oj-table scroll-policy="loadMoreOnScroll" class="oj-sm-width-full oj-bg-body" display="grid"
                horizontal-grid-visible="enabled" vertical-grid-visible="enabled" selection-mode.row="single"
                selection-mode.column="single" id="crSearchTbl" data="[[$variables.changeRequestADP]]"
                columns='[{"headerText":"S.No","field":"sno","resizable":"enabled","width":60,"template":"sno_tmpl","headerStyle":"white-space: normal;","style":"text-align:center;"},{"headerText":"Initiator","field":"initiator","resizable":"enabled","width":140,"template":"initiator_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Department","field":"department","resizable":"enabled","width":150,"template":"department_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Position","field":"position","resizable":"enabled","width":150,"template":"position_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Date","field":"cr_date","resizable":"enabled","width":120,"template":"date_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Change Title","field":"title","resizable":"enabled","width":160,"template":"title_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Change Number","field":"cr_number","resizable":"enabled","width":150,"template":"cr_number_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Time Impact (Days)","field":"time_impact","resizable":"enabled","width":160,"template":"time_impact_tmpl","headerStyle":"white-space: normal;","style":"text-align:center;"},{"headerText":"Cost Impact (OMR)","field":"cost_impact","resizable":"enabled","width":160,"template":"cost_impact_tmpl","headerStyle":"white-space: normal;","style":"text-align:right;"},{"headerText":"Status","field":"status_id","resizable":"enabled","width":120,"template":"status_tmpl","headerStyle":"white-space: normal;","style":";"},{"headerText":"Actions","field":"","resizable":"enabled","width":100,"template":"actions_tmpl","headerStyle":"white-space: normal;","style":"text-align:center;"}]'>

                <!-- S.No Template -->
                <template slot="sno_tmpl">
                  <oj-bind-text value="[[$current.index + 1]]"></oj-bind-text>
                </template>

                <!-- Initiator Template -->
                <template slot="initiator_tmpl">
                  <oj-input-text readonly="true" value="[[$current.data]]" style="width:100%;"></oj-input-text>
                </template>

                <!-- Department Template -->
                <template slot="department_tmpl">
                  <oj-input-text readonly="true" value="[[$current.data]]" style="width:100%;"></oj-input-text>
                </template>

                <!-- Position Template -->
                <template slot="position_tmpl">
                  <oj-input-text readonly="true" value="[[$current.data]]" style="width:100%;"></oj-input-text>
                </template>

                <!-- Date Template -->
                <template slot="date_tmpl">
                  <oj-input-date value="[[$current.data]]" readonly="true"
                    converter='{"type":"datetime","options":{"pattern":"dd-MMM-yyyy"}}'>
                  </oj-input-date>
                </template>

                <!-- Change Title Template -->
                <template slot="title_tmpl">
                  <oj-input-text readonly="true" value="[[$current.data]]" style="width:100%;"></oj-input-text>
                </template>

                <!-- Change Number Template (Edit Link) -->
                <template slot="cr_number_tmpl">
                  <a id="crEditLink"
                    style="font-weight:bold; color:#084c4c; cursor:pointer; text-decoration:underline;">
                    <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                  </a>
                </template>

                <!-- Time Impact Template -->
                <template slot="time_impact_tmpl">
                  <oj-input-text readonly="true" value="[[$current.data]]" style="width:100%;"></oj-input-text>
                </template>

                <!-- Cost Impact Template -->
                <template slot="cost_impact_tmpl">
                  <oj-input-number readonly="true" value="[[$current.data]]"
                    converter='{"type":"number","options":{"style":"decimal","minimumFractionDigits":3,"maximumFractionDigits":3}}'
                    style="width:100%;">
                  </oj-input-number>
                </template>

                <!-- Status Template (Badge) -->
                <template slot="status_tmpl">
                  <oj-bind-if test='[[$current.data === "Draft"]]'>
                    <span style="font-size:13px; color:#555555; font-weight:bold;">Draft</span>
                  </oj-bind-if>
                  <oj-bind-if test='[[$current.data === "Pending"]]'>
                    <span style="font-size:13px; color:#e68a00; font-weight:bold;">Pending</span>
                  </oj-bind-if>
                  <oj-bind-if test='[[$current.data === "Approved"]]'>
                    <span style="font-size:13px; color:#267d00; font-weight:bold;">Approved</span>
                  </oj-bind-if>
                  <oj-bind-if test='[[$current.data === "Rejected"]]'>
                    <span style="font-size:13px; color:#cc0000; font-weight:bold;">Rejected</span>
                  </oj-bind-if>
                </template>

                <!-- Actions Template -->
                <template slot="actions_tmpl">
                  <div style="display:flex; gap:4px; justify-content:center;">
                    <oj-button display="icons" chroming="borderless" id="editRowBtn"
                      on-oj-action="[[$listeners.editRowBtnAction]]">
                      <span slot="startIcon" class="oj-ux-ico-edit"></span>
                    </oj-button>
                    <oj-button display="icons" chroming="borderless" id="deleteRowBtn">
                      <span slot="startIcon" class="oj-ux-ico-delete"></span>
                    </oj-button>
                  </div>
                </template>

              </oj-table>

              <!-- Pagination Section -->
              <div class="oj-flex oj-sm-justify-content-center" style="margin-top: 0.25rem; gap: 1rem;">
                <div class="oj-flex-item oj-sm-flex-initial">
                  <oj-button label="Prev" chroming="outlined" id="prevBtn"
                    disabled="[[ $variables.pagination.is_prev ]]" on-oj-action="[[$listeners.prevBtnAction]]">
                    <span slot="startIcon" class="oj-ux-ico-back"></span>
                  </oj-button>
                </div>

                <div
                  style="display: flex; align-items: center; width: fit-content; min-width: 120px; max-width: 130px;">
                  <oj-input-text id="pagination-details" disabled="true" aria-label="Pagination Details"
                    value="{{ $variables.paginationDisplay }}"></oj-input-text>
                </div>
                <div class="oj-flex-item oj-sm-flex-initial">
                  <oj-button label="Next" chroming="outlined" id="nextBtn" class=""
                    disabled="[[ $variables.pagination.is_next ]]" on-oj-action="[[$listeners.nextBtnAction]]">
                    <span slot="endIcon" class="oj-ux-ico-forward-next"></span>
                  </oj-button>
                </div>
              </div>

              <!-- </div> -->
              <!-- </oj-collapsible> -->

            </div>
          </div>

        </oj-sp-advanced-create-edit>
      </div>
    </div>
  </div>
</div>


<oj-dialog id="progressDialog" dialog-title="Processing" style="width: 300px;" cancel-behavior="none">
  <div slot="body" style="text-align: center; padding: 2rem;">
    <oj-progress-bar value="-1"></oj-progress-bar>
    <p style="margin-top: 1rem;">Please wait...</p>
  </div>
</oj-dialog>

<oj-dialog id="loadingDialog" style="width: 300px;" cancel-behavior="none" drag-affordance="title-bar"
  header-decoration="off" position.at.vertical="top" position.my.vertical="top">
  <div slot="body" style="text-align: center; padding: 2rem;">
    <oj-progress-circle value="-1"></oj-progress-circle>
    <p style="margin-top: 1rem; font-weight: 500;">Loading List Data...</p>
  </div>
</oj-dialog>
