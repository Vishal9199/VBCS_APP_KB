          search-config="[[ $variables.searchConfiguration.provider ]]"
          search-context="[[ $variables.searchContext ]]"
          id="futureProjects_smartsearch" ask-hint="Search future projects...">
        </oj-sp-smart-search>
      </div>
      <div style="display: flex; gap: 0.25rem; margin-left: 1rem; margin-top: 1px; flex-wrap: wrap;">
        <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Reset" id="resetBtn"
          on-oj-action="[[$listeners.resetBtn]]">
          <span slot="startIcon" class="oj-ux-ico-reset"></span>
        </oj-button>

          on-oj-action="[[$listeners.refreshBtn]]">
          <span slot="startIcon" class="oj-ux-ico-refresh"></span>
        </oj-button>
      </div>
    </div>

            ($current.row.dec_actual || 0)
          ]]"></oj-bind-text>
        </template>

      </oj-table>

<!-- DELETE CONFIRM DIALOG                                   -->
<!-- ═══════════════════════════════════════════════════════ -->
<oj-dialog id="deleteDialog" dialog-title="Confirm Delete" style="width:380px; overflow: hidden;"
  header-decoration="off">
  <div slot="body">
    <p style="margin-top: 0.5rem;">Are you sure you want to delete this record?</p>
  </div>
  <div slot="footer" style="display:flex; gap:0.5rem; justify-content:flex-end;">
    <oj-button chroming="solid" label="Cancel" id="deleteCancelBtn"
      on-oj-action="[[$listeners.deleteCancelBtn]]">
    </oj-button>
    <oj-button chroming="solid" label="Delete" id="deleteConfirmBtn"
      on-oj-action="[[$listeners.deleteConfirmBtn]]"
      style="--oj-button-solid-bg-color: #c00000;">
      <span slot="startIcon" class="oj-ux-ico-delete"></span>
    </oj-button>
  </div>
</oj-dialog>
