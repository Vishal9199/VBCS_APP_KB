<div id="sampleDemo" style="" class="demo-padding demo-container">

              <span slot="header" style="font-weight: bold; color: white;">Project Details</span>
              <div style="margin-top: 0; padding: 1rem; border-left: 4px;">
                <oj-form-layout max-columns="2" label-edge="start" label-width="30%" colspan-wrap="wrap">

                  <oj-input-text id="statusProgressProjectName" label-hint="Project Name" placeholder="Project Name"
                    user-assistance-density="compact" style="width: 16rem;"
                    value="{{ $variables.headerInfoVar.projectName }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="statusProgressProjectNumber" label-hint="Project Number"
                    placeholder="Project Number" user-assistance-density="compact" style="width: 16rem;"
                    value="{{ $variables.headerInfoVar.projectNumber }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="statusProgressTenderNumber" label-hint="Tender Number" placeholder="Tender Number"
                    user-assistance-density="compact" style="width: 16rem;"
                    value="{{ $variables.headerInfoVar.tenderNumber }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="statusProgressPeriod" label-hint="Period" placeholder="Period"
                    value="{{ $variables.periodName }}" user-assistance-density="compact" style="width: 16rem;"
                    disabled="true">
                  </oj-input-text>

              </div>
            </oj-collapsible>

                    </oj-input-text>

                    <oj-input-text id="statusProgressActualPercentage" label-hint="Actual %(Cumulative)"

                    </oj-input-text>

                      <oj-button slot="trigger" label="Upload" chroming="solid" class="oj-button-full-width"

                      </oj-button>
                    </oj-file-picker> -->

                    <oj-text-area id="project-desc" label-hint="Period Summary" placeholder="Enter Project Description"

                      value="{{ $variables.getStatusprogressbyperiodVar.period_summary }}" required="true">
                    </oj-text-area>

                    <oj-text-area id="statusProgressWorkPlanned" label-hint="Work Planned"

                    </oj-text-area>

                    <!-- File Name with Download -->

                                  <span class="oj-ux-ico-download" slot="startIcon" style="color:#d35400;"></span>
                                </oj-button>
                              </oj-bind-if>
                      </div>
                    </oj-input-text> -->

                    <oj-text-area id="statusProgressWorkPerformed" label-hint="Work Performed"
                      placeholder="Enter work performed details" rows="6" required="true"
                      user-assistance-density="compact" style="width: 16rem;" resize-behavior="vertical"
                      value="{{ $variables.getStatusprogressbyperiodVar.work_performed }}">
                    </oj-text-area>

                    <oj-text-area id="statusProgressActionItems" label-hint="Action Items"
                      placeholder="Enter action items" rows="25" required="true" user-assistance-density="compact"
                      style="width: 16rem;" resize-behavior="vertical"
                      value="{{ $variables.getStatusprogressbyperiodVar.actual_items }}">
                    </oj-text-area>


                    <!-- File Type with Delete -->
                    <!-- <oj-input-text id="attachment-file-type" label-hint="File Type" style="width: 16rem;" required="true"

                      <div slot="end">
                        <oj-bind-if

            </oj-collapsible>

          </div>
        </div>

      </oj-sp-advanced-create-edit>

    </div>
  </div>
</div>


<!-- Attachment -->

<oj-dialog dialog-title="Attachment" id="attachmentDialog" cancel-behavior="icon" style="width:35%;"
  position.at.vertical="top" position.my.vertical="top">

  <div slot="body">
    <oj-validation-group id="attachment-validation">
      <oj-form-layout id="attachmentFormLayout" label-edge="start" direction="row" max-columns="1"
        style="margin-top:2%;" label-width="35%" user-assistance-density="compact">
        <!-- File Upload -->
        <oj-label show-required="true" style="font-weight: 600;">File Upload</oj-label>
        <oj-file-picker id="attachment-file-picker" selection-mode="single"
          on-oj-select="[[$listeners.attachmentFilePickerSelect]]">
          <oj-button slot="trigger" label="Upload" chroming="solid" class="oj-button-full-width" id="bankUpload">
            <span slot="startIcon" class="oj-ux-ico-upload"></span>
          </oj-button>
        </oj-file-picker>


        <!-- File Name with Download -->
        <oj-input-text id="attachment-file-name" label-hint="File Name" style="width: 16rem;" required="true"
          user-assistance-density="compact" value="{{ $variables.attachmentObj.P_DOCUMENT_NAME }}" readonly="true">
          <div slot="end">
            <!-- <oj-bind-if

                                  <span class="oj-ux-ico-download" slot="startIcon" style="color:#d35400;"></span>
                                </oj-button>

          </div>
        </oj-input-text>


        <!-- File Type with Delete -->

          <div slot="end">
            <!-- <oj-bind-if

                                </oj-button>

        </oj-input-text>

        <oj-input-text id="attachment-file-desc" value="{{ $variables.attachmentObj.P_DESCRIPTION }}"

      </oj-form-layout>
    </oj-validation-group>
  </div>

  <div slot="footer" style="display:flex; justify-content:flex-end; margin-top:1rem;">

    <oj-button id="attachment-save-add" chroming="solid" label="Save" style="margin-left:0.5%;margin-right:0.5%;"

<!-- About Dialog -->

<oj-dialog dialog-title="About" id="details" cancel-behavior="icon"
  style="overflow: hidden; min-width: 30%; width: 30%;" position.at.vertical="top">
  <div slot="body">
    <div class="oj-flex">
      <div class="oj-flex-item oj-sm-12 oj-md-12">
        <oj-form-layout label-edge='start' readonly="true" user-assistance-density="compact" label-width="40%">
          <oj-input-text label-hint="Created By:" value="{{ $variables.getStatusprogressbyperiodVar.created_by }}"
            readonly="true">
          </oj-input-text>
          <oj-input-date label-hint="Created Date : "
            converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy hh:mm a"}}'
            value="{{ $variables.getStatusprogressbyperiodVar.created_date }}" readonly="true"
            class="oj-form-control-width-sm">
          </oj-input-date>
          <oj-input-text label-hint="Last Updated By:"
            value="{{ $variables.getStatusprogressbyperiodVar.last_updated_by }}" readonly="true">
          </oj-input-text>
          <oj-input-date label-hint="Last Updated Date : "
            converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy hh:mm a"}}'
            value="{{ $variables.getStatusprogressbyperiodVar.last_updated_date }}" readonly="true"
            class="oj-form-control-width-sm"></oj-input-date>
          <oj-input-text label-hint="Last Login By:"
            value="{{ $variables.getStatusprogressbyperiodVar.last_updated_login }}" readonly="true">
          </oj-input-text>

        </oj-form-layout>
      </div>
    </div>
  </div>
  <div slot="footer" style="padding: 0px 32px 32px 32px">
    <oj-button on-oj-action="[[$listeners.buttonAction]]">Ok</oj-button>
  </div>
</oj-dialog>
