<style>
  #details .oj-text-field.oj-read-only .oj-text-field-container {
    background-color: transparent;
    height: var(--oj-text-field-height);
    padding: 3px;
    min-height: 1rem;
    border: none !important;
  }

  #hseIndicatorsId_h_cancelAction {
    display: none !important;
  }
</style>





<div id="sampleDemo" style="" class="demo-padding demo-container">
  <div id="componentDemoContent" style="width: 1px; min-width: 100%;">
    <div id="mainContent">

      <oj-sp-advanced-create-edit id="hseIndicatorsId" display-options.responsive-padding="on"
        primary-action.label="Close" page-title="HSE Indicators" page-subtitle="  "
        on-sp-primary-action="[[$listeners.hseIndicatorsIdSpPrimaryAction]]"
        secondary-actions="[[ $variables.aToolBarList ]]"
        on-sp-secondary-action="[[$listeners.hseIndicatorsIdSpSecondaryAction]]">

        <div slot="main" style="padding-top: 0; margin-top: 0.1rem; min-width: 100%;">
          <div style="margin-top: 0;">

            <!-- Project Details Section -->
            <oj-collapsible id="hse-project-details-section" expanded="true"
              class="oj-panel oj-panel-shadow-md oj-selected" style="margin-top: 1rem;">
              <span slot="header" style="font-weight: bold; color: white;">Project Details</span>
              <div style="margin-top: 0; padding: 1rem; border-left: 4px;">
                <oj-form-layout max-columns="2" label-edge="start" label-width="40%" colspan-wrap="wrap">

                  <oj-input-text id="hseProjectNumber" label-hint="Project Number" placeholder="Project Number"
                    user-assistance-density="compact" style="width: 100%;"
                    value="{{ $variables.headerInfoVar.projectNumber }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="hseProjectName" label-hint="Project Name" placeholder="Project Name"
                    user-assistance-density="compact" style="width: 100%;"
                    value="{{ $variables.headerInfoVar.projectName }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="hseTenderNumber" label-hint="Tender Number" placeholder="Tender Number"
                    user-assistance-density="compact" style="width: 100%;"
                    value="{{ $variables.headerInfoVar.tenderNumber }}" disabled="true">
                  </oj-input-text>

                  <oj-input-text id="hsePeriod" label-hint="Period" placeholder="Period"
                    user-assistance-density="compact" style="width: 100%;"
                    value="{{ $variables.periodName }}" disabled="true">
                  </oj-input-text>

                </oj-form-layout>
              </div>
            </oj-collapsible>

            <!-- HSE Indicators + HSE Activity Side by Side -->
            <div style="display: flex; gap: 1rem; margin-top: 1rem; align-items: flex-start;">

              <!-- HSE Indicators Section -->
              <!-- HSE Indicators Section -->
              <oj-collapsible id="hse-indicators-section" expanded="true"
                class="oj-panel oj-panel-shadow-md oj-selected" style="flex: 1;">
                <span slot="header" style="font-weight: bold; color: white;">HSE Indicators</span>
                <div style="padding: 1rem;">
                  <oj-validation-group id="hse-indicators-validation">
                    <oj-form-layout max-columns="1" label-edge="start" label-width="50%" colspan-wrap="wrap">

                      <oj-input-text id="hseTotalManpower" label-hint="Total Manpower at Project Site"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.manpower_at_project }}">
                      </oj-input-text>

                      <oj-input-text id="hseOmaniStaff" label-hint="No Of Omani Staff" user-assistance-density="compact"
                        style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.no_of_omani_staff }}">
                      </oj-input-text>

                      <oj-input-text id="hseSubContractors" label-hint="Sub Contractors"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.sub_contractors }}">
                      </oj-input-text>

                      <oj-input-text id="hseRoadTrafficAccidents" label-hint="Road Traffic Accidents"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.road_traffic_accidents }}">
                      </oj-input-text>

                      <oj-input-text id="hseUtilityDamages" label-hint="Utility Damages"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.utility_damages }}">
                      </oj-input-text>

                      <oj-input-text id="hseEnvironmentalAccidents" label-hint="Environmental Accidents"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.environmental_accidents }}">
                      </oj-input-text>

                      <oj-input-text id="hseFirstAidCases" label-hint="First Aid Cases"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.first_aid_cases }}">
                      </oj-input-text>

                      <oj-input-text id="hseNearMissCases" label-hint="Near Miss Cases"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.near_miss_cases }}">
                      </oj-input-text>

                      <oj-input-text id="hseLostTime" label-hint="Lost Time" user-assistance-density="compact"
                        style="width: 100%;" value="{{ $variables.getPmispddStatushseGetbytenderidVar.lost_time }}">
                      </oj-input-text>

                      <oj-input-text id="hseFatality" label-hint="Fatality" user-assistance-density="compact"
                        style="width: 100%;" value="{{ $variables.getPmispddStatushseGetbytenderidVar.fatality }}">
                      </oj-input-text>

                      <oj-input-text id="hseSafeWorkingDays" label-hint="Safe Working Days Without LTI"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.safe_working_days }}">
                      </oj-input-text>

                      <oj-input-text id="hseManHoursWorked" label-hint="Man Hours Worked without LTI"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.man_hours_without_lti }}">
                      </oj-input-text>

                    </oj-form-layout>
                  </oj-validation-group>
                </div>
              </oj-collapsible>

              <!-- HSE Activity Section -->
              <oj-collapsible id="hse-activity-section" expanded="true" class="oj-panel oj-panel-shadow-md oj-selected"
                style="flex: 1;">
                <span slot="header" style="font-weight: bold; color: white;">HSE Activity</span>
                <div style="padding: 1rem;">
                  <oj-validation-group id="hse-activity-validation">
                    <oj-form-layout max-columns="1" label-edge="start" label-width="50%" colspan-wrap="wrap">

                      <oj-input-text id="hseActivityMeetings" label-hint="Hse Meetings"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.hse_meetings }}">
                      </oj-input-text>

                      <oj-input-text id="hseActivityAudits" label-hint="Hse Audits" user-assistance-density="compact"
                        style="width: 100%;" value="{{ $variables.getPmispddStatushseGetbytenderidVar.hse_audits }}">
                      </oj-input-text>

                      <oj-input-text id="hseActivityInspections" label-hint="Hse Inspections"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.hse_inspections }}">
                      </oj-input-text>

                      <oj-input-text id="hseActivityTraining" label-hint="Hse Training"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.hse_training }}">
                      </oj-input-text>

                      <oj-input-text id="hseActivitySiteInductions" label-hint="Site Inductions"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.site_inductions }}">
                      </oj-input-text>

                      <oj-input-text id="hseActivityEmergencyDrills" label-hint="Emergency Drills"
                        user-assistance-density="compact" style="width: 100%;"
                        value="{{ $variables.getPmispddStatushseGetbytenderidVar.emergency_drills }}">
                      </oj-input-text>

                    </oj-form-layout>
                  </oj-validation-group>
                </div>
              </oj-collapsible>

            </div>
            <!-- End Side by Side -->

          </div>
        </div>
      </oj-sp-advanced-create-edit>

    </div>
  </div>
</div>

<!-- About Dialog -->

<oj-dialog dialog-title="About" id="details" cancel-behavior="icon"
  style="overflow: hidden; min-width: 30%; width: 30%;" position.at.vertical="top">
  <div slot="body">
    <div class="oj-flex">
      <div class="oj-flex-item oj-sm-12 oj-md-12">
        <oj-form-layout label-edge='start' readonly="true" user-assistance-density="compact" label-width="40%">
          <oj-input-text label-hint="Created By:"
            value="{{ $variables.getPmispddStatushseGetbytenderidVar.created_by }}" readonly="true">
          </oj-input-text>
          <oj-input-date label-hint="Created Date : "
            converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy hh:mm a"}}'
            value="{{ $variables.getPmispddStatushseGetbytenderidVar.created_date }}" readonly="true"
            class="oj-form-control-width-sm">
          </oj-input-date>
          <oj-input-text label-hint="Last Updated By:"
            value="{{ $variables.getPmispddStatushseGetbytenderidVar.last_updated_by }}" readonly="true">
          </oj-input-text>
          <oj-input-date label-hint="Last Updated Date : "
            converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy hh:mm a"}}'
            value="{{ $variables.getPmispddStatushseGetbytenderidVar.last_updated_date }}" readonly="true"
            class="oj-form-control-width-sm"></oj-input-date>
          <oj-input-text label-hint="Last Login By:"
            value="{{ $variables.getPmispddStatushseGetbytenderidVar.last_updated_login }}" readonly="true"
            on-value-changed="[[$listeners.inputTextValue]]">
          </oj-input-text>

        </oj-form-layout>
      </div>
    </div>
  </div>
  <div slot="footer" style="padding: 0px 32px 32px 32px">
    <oj-button>Ok</oj-button>
  </div>
</oj-dialog>
