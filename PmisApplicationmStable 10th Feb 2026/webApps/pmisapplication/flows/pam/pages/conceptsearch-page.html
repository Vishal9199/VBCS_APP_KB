<style>
  .oj-sp-header-general-overview-header-strip {
    display: none;
  }
</style>

<div id="sampleDemo1" class="demo-padding demo-container">
  <div id="componentDemoContent1" style="width: 1px; min-width: 100%;">
    <div id="mainContent1">
      <oj-sp-smart-search-page id="oj_exssp1" page-title="PAM Schedule Details" page-subtitle=" ">

        <!--Search Section -->
        <oj-flex slot="search" class="oj-sm-padding-2x" style="align-items: center;">
          <div class="oj-flex oj-sm-flex-wrap-nowrap oj-sm-justify-content-space-between"
            style="width: 100%; align-items: flex-start; padding: 0 1rem;">
            <div style="flex: 1; margin-right: 1rem;">
              <oj-sp-smart-search filter-criterion="{{ $variables.filterCriterion }}"
                search-config="[[ $variables.searchConfiguration.provider ]]"
                search-context="[[ $variables.searchContext ]]" id="pam_smartsearch"
                ask-hint="Search schedule details here...">
              </oj-sp-smart-search>
            </div>
            <div style="display: flex; gap: 0.25rem; margin-left: 1rem; margin-top: 1px; flex-wrap: wrap;">
              <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Reset" id="resetBtn"
                on-oj-action="[[$listeners.resetBtnAction]]">
                <span slot="startIcon" class="oj-ux-ico-reset"></span>
              </oj-button>
              <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Refresh"
                id="refreshBtn" on-oj-action="[[$listeners.refreshBtnAction]]">
                <span slot="startIcon" class="oj-ux-ico-refresh"></span>
              </oj-button>
              <oj-button style="margin:0.125rem;" chroming="outlined" class="oj-button-md" label="Add Row"
                id="addRowBtn" on-oj-action="[[$listeners.addRowBtnAction]]">
                <span slot="startIcon" class="oj-ux-ico-plus"></span>
              </oj-button>
            </div>
          </div>
        </oj-flex>

        <!--Table Section -->
        <div id="sampleDemo" class="demo-padding demo-container">
          <div id="componentDemoContent" style="width: 1px; min-width: 100%;">
            <div id="searchMainContent">

              <div class="oj-flex">
                <!-- PAM Schedule Table with Inline Edit -->
                <oj-table scroll-policy="loadMoreOnScroll" class="oj-sm-width-full oj-bg-body" display="grid"
                  horizontal-grid-visible="enabled" vertical-grid-visible="enabled" selection-mode.row="single"
                  edit-mode="rowEdit" id="pamScheduleTable" data="[[ $variables.bufferDPTable ]]"
                  columns="{{ $constants.columnsvar}}"
                  on-oj-before-row-edit="[[$listeners.pamScheduleTableBeforeRowEdit]]"
                  on-oj-before-row-edit-end="[[$listeners.pamScheduleTableBeforeRowEditEnd]]"
                  >

                  <!-- ACTION COLUMN TEMPLATE -->
                  <template slot="Action">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <div style="display: flex; gap: 4px; justify-content: center;">
                        <oj-button display="icons" chroming="borderless" class="oj-button-sm">
                          <span slot="startIcon" class="oj-ux-ico-edit" role="img" title="Edit Row"></span>
                        </oj-button>
                        <oj-button display="icons" chroming="borderless" class="oj-button-sm"
                          on-oj-action="[[$listeners.buttonAction]]">
                          <span slot="startIcon" class="oj-ux-ico-trash" role="img" title="Delete Row"></span>
                        </oj-button>
                      </div>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <div style="display: flex; gap: 4px; justify-content: center;">
                        <oj-button display="icons" chroming="borderless" class="oj-button-sm" id="saveBtn">
                          <span slot="startIcon" class="oj-ux-ico-save" role="img" title="Save"></span>
                        </oj-button>
                        <oj-button display="icons" chroming="borderless" class="oj-button-sm" id="cancelBtn">
                          <span slot="startIcon" class="oj-ux-ico-close" role="img" title="Cancel"></span>
                        </oj-button>
                      </div>
                    </oj-bind-if>
                  </template>

                  <!-- PROJECT NAME TEMPLATE -->
                  <template slot="Project Name">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.project_id }}"
                        data="[[ $variables.getProjectLovListSDP ]]"
                        item-text="project_name"
                        placeholder="Select Project" id="project">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- CONSULTANT NAME TEMPLATE -->
                  <template slot="Consultant Name">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.consultant_id }}"
                        data="[[ $variables.getConsultantLovListSDP ]]"
                        item-text="lookup_value_name"
                        placeholder="Select Consultant" id="concultant">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- BUDGET AMOUNT TEMPLATE -->
                  <template slot="Budget Amount">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-number 
                        value="{{ $variables.lvCurrentRow.budget_amount }}"
                        placeholder="Enter budget">
                      </oj-input-number>
                    </oj-bind-if>
                  </template>

                  <!-- PHASE TEMPLATE -->
                  <template slot="Phase">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.phase_id }}"
                        data="[[ $variables.getPhaseLovListSDP ]]"
                        item-text="lookup_value_name"
                        placeholder="Select Phase" id="phase">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- MILESTONE TEMPLATE -->
                  <template slot="Milestone">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.milestone_id }}"
                        data="[[ $variables.getMilestoneLovListSDP ]]"
                        item-text="lookup_value_name"
                        placeholder="Select Milestone" id="milestone">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- SENIOR CONCEPT ENGINEER TEMPLATE -->
                  <template slot="Senior Concept Engineer">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.cs_senior_mgr_id }}"
                        data="[[ $variables.getSeniorManagerLovListSDP ]]"
                        item-text="user_name"
                        placeholder="Select Senior Manager" id="seniorid">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- PLANNING MANAGER TEMPLATE -->
                  <template slot="Planning Manager">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-select-single 
                        value="{{ $variables.lvCurrentRow.cs_planning_mgr_id }}"
                        data="[[ $variables.getPlanningManagerLovListSDP ]]"
                        item-text="user_name"
                        placeholder="Select Planning Manager" id="panningid">
                      </oj-select-single>
                    </oj-bind-if>
                  </template>

                  <!-- PLANNED START DATE TEMPLATE -->
                  <template slot="Planned Start Date">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-date 
                        value="{{ $variables.lvCurrentRow.planned_start_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                      </oj-input-date>
                    </oj-bind-if>
                  </template>

                  <!-- PLANNED END DATE TEMPLATE -->
                  <template slot="Planned End Date">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-date 
                        value="{{ $variables.lvCurrentRow.planned_end_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                      </oj-input-date>
                    </oj-bind-if>
                  </template>

                  <!-- ACTUAL START DATE TEMPLATE -->
                  <template slot="Actual Start Date">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-date 
                        value="{{ $variables.lvCurrentRow.actual_start_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                      </oj-input-date>
                    </oj-bind-if>
                  </template>

                  <!-- ACTUAL END DATE TEMPLATE -->
                  <template slot="Actual End Date">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-date 
                        value="{{ $variables.lvCurrentRow.actual_end_date }}"
                        converter='{"type": "datetime", "options": {"pattern":"dd-MMM-yyyy"}}'>
                      </oj-input-date>
                    </oj-bind-if>
                  </template>

                  <!-- % OF COMPLETION TEMPLATE -->
                  <template slot="% of Completion">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data + '%']]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-number 
                        value="{{ $variables.lvCurrentRow.completion_percentage }}"
                        min="0"
                        max="100"
                        placeholder="0-100">
                      </oj-input-number>
                    </oj-bind-if>
                  </template>

                  <!-- REMARKS TEMPLATE -->
                  <template slot="Remarks">
                    <oj-bind-if test="[[$current.mode=='navigation']]">
                      <oj-bind-text value="[[$current.data]]"></oj-bind-text>
                    </oj-bind-if>
                    <oj-bind-if test="[[$current.mode=='edit']]">
                      <oj-input-text 
                        value="{{ $variables.lvCurrentRow.remarks }}"
                        placeholder="Enter remarks">
                      </oj-input-text>
                    </oj-bind-if>
                  </template>

                </oj-table>
              </div>
            </div>
          </div>
        </div>

        <!-- Pagination Section -->
        <div class="oj-flex oj-sm-justify-content-center" style="margin-top: 0.25rem; gap: 1rem;">
          <div class="oj-flex-item oj-sm-flex-initial">
            <oj-button label="Prev" chroming="outlined" id="prevBtn" on-oj-action="[[$listeners.prevBtnAction]]"
              disabled="[[ $variables.pagination.is_prev ]]">
              <span slot="startIcon" class="oj-ux-ico-back"></span>
            </oj-button>
          </div>

          <div style="display: flex; align-items: center; width: fit-content; min-width: 120px; max-width: 130px;">
            <oj-input-text id="pagination-details" disabled="true" aria-label="Pagination Details"
              value="{{ $variables.paginationDisplay }}"></oj-input-text>
          </div>
          <div class="oj-flex-item oj-sm-flex-initial">
            <oj-button label="Next" chroming="outlined" id="nextBtn" class=""
              on-oj-action="[[$listeners.nextBtnAction]]" disabled="[[ $variables.pagination.is_next ]]">
              <span slot="endIcon" class="oj-ux-ico-forward-next"></span>
            </oj-button>
          </div>
        </div>

      </oj-sp-smart-search-page>
    </div>
  </div>
</div>

<!-- Delete Confirmation Dialog -->
<oj-dialog style="display:none; width: 500px; overflow: hidden;" dialog-title="Warning" id="delete_dialog"
  cancel-behavior="icon" header-decoration="off" drag-affordance="title-bar" position.at.vertical="top"
  position.my.vertical="top">
  <div slot="body" style="margin-top: 1.5rem;">
    <div class="oj-flex">Are you sure you want to delete the record?</div>
  </div>
  <div slot="footer">
    <oj-button chroming="solid" on-oj-action="[[$listeners.buttonAction3]]">Ok</oj-button>
    <oj-button chroming="solid" on-oj-action="[[$listeners.buttonAction4]]">Cancel</oj-button>
  </div>
</oj-dialog>

<!-- Progress Dialog -->
<oj-dialog id="progressDialog" dialog-title="Processing" style="width: 300px;" cancel-behavior="none">
  <div slot="body" style="text-align: center; padding: 2rem;">
    <oj-progress-bar value="-1"></oj-progress-bar>
    <p style="margin-top: 1rem;">Please wait...</p>
  </div>
</oj-dialog>

<oj-dialog id="loadingDialog" style="width: 300px;" cancel-behavior="none" drag-affordance="title-bar"
  header-decoration="off" position.at.vertical="top" position.my.vertical="top">
  <div slot="body" style="text-align: center; padding: 2rem;">
    <oj-progress-circle value="-1"></oj-progress-circle>
    <p style="margin-top: 1rem; font-weight: 500;">Loading Schedule List Data...</p>
  </div>
</oj-dialog>
