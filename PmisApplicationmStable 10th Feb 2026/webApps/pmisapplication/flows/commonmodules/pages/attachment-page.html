<!-- Dialog with FIXED oj-bind-if structure -->
<oj-dialog dialog-title="Attachment" id="attachmentDialog" cancel-behavior="icon" style="overflow: hidden;"
  position.at.vertical="top" position.my.vertical="top" drag-affordance="title-bar" resize-behavior="resizable"
  header-decoration="off">

  <div slot="body">
    <oj-validation-group valid="{{ $variables.formObj.addDialogValidate }}" id="attachment-validation">
      <oj-form-layout id="attachmentFormLayout" label-edge="start" direction="row" max-columns="2"
        user-assistance-density="compact" class="oj-formlayout-full-width">

        <oj-radioset label-hint="Type" required="true" class="oj-choice-direction-row" id="radio"
          value="{{ $variables.attachmentObj.P_TYPE }}">
          <oj-option value="FILE">File</oj-option>
          <oj-option value="TEXT">Text</oj-option>
          <oj-option value="URL">URL</oj-option>
        </oj-radioset>

        <!-- FILE Type Fields -->
        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'FILE' ]]">
          <div style="text-align:center; grid-column: 1 / -1;">
            <oj-file-picker id="attachment-file-picker" selection-mode="single"
              on-oj-select="[[$listeners.attachmentFilePickerSelect]]">
              <oj-button slot="trigger" label="Upload" chroming="outlined">
                <span slot="startIcon" class="oj-ux-ico-upload" style="color: white;"></span>
              </oj-button>
            </oj-file-picker>
          </div>
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.P_SCREEN_NAME === 'Project Charter' ]]">
          <oj-select-single label-hint="PC Attachment For" id="pc_attachment_lov" style="width:16rem;"
            value="{{ $variables.selectedPcAttachment }}" item-text="lookup_value_name" placeholder="Select attachment type"
            required="true" data="[[ $variables.pcAttachmentsSDP ]]">
            <template slot="collectionTemplate" data-oj-as="collection">
              <oj-table scroll-policy="loadMoreOnScroll" selection-mode='{"row": "single"}'
                columns-default='{"resizable": "disabled","sortable": "disabled"}' class="oj-select-results"
                columns='[{"headerText":"Attachment","field":"lookup_value_name"},{"headerText":"Remarks","field":"remarks"}]'
                on-oj-row-action="[[collection.handleRowAction]]" data="[[collection.data]]"
                selected.row="[[collection.selected]]" current-row="{{collection.currentRow}}"
                horizontal-grid-visible="enabled" vertical-grid-visible="enabled" display="grid">
              </oj-table>
            </template>
          </oj-select-single>
          <!-- <oj-select-single label-hint="PC Attachment For" id="pc_attachment_lov" style="width:16rem;"
                    value="{{ $variables.selectedPcAttachment }}" data="[[ $variables.pcAttachmentOptions ]]" item-text="label"
                    placeholder="Select attachment type" required="true">
                  </oj-select-single> -->
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'FILE' ]]">
          <oj-input-text id="attachment-file-name" label-hint="File Name" style="width:16rem;" disabled="true"
            value="{{ $variables.attachmentObj.P_DOCUMENT_NAME }}">
          </oj-input-text>
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'FILE' ]]">
          <oj-input-text id="attachment-file-type" value="{{ $variables.attachmentObj.P_DOCUMENT_TYPE }}"
            label-hint="File Type" style="width:16rem;" disabled="true">
          </oj-input-text>
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'FILE' ]]">
          <oj-input-text id="attachment-file-desc" value="{{ $variables.attachmentObj.P_DESCRIPTION }}"
            label-hint="Description" style="width:16rem;">
          </oj-input-text>
        </oj-bind-if>

        <!-- URL Type Fields -->
        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'URL' ]]">
          <oj-input-text id="attachment-url" label-hint="URL" value="{{ $variables.attachmentObj.P_URL }}"
            required="true" style="width:16rem;">
          </oj-input-text>
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'URL' ]]">
          <oj-input-text id="attachment-url-desc" value="{{ $variables.attachmentObj.P_DESCRIPTION }}"
            label-hint="Description" style="width:16rem;">
          </oj-input-text>
        </oj-bind-if>

        <!-- TEXT Type Fields -->
        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'TEXT' ]]">
          <oj-input-text id="attachment-text-title" value="{{ $variables.attachmentObj.P_TITLE }}" label-hint="Title"
            style="width:16rem;" required="true">
          </oj-input-text>
        </oj-bind-if>

        <oj-bind-if test="[[ $variables.attachmentObj.P_TYPE === 'TEXT' ]]">
          <oj-input-text id="attachment-text-desc" value="{{ $variables.attachmentObj.P_DESCRIPTION }}"
            label-hint="Description" style="width:16rem;">
          </oj-input-text>
        </oj-bind-if>

      </oj-form-layout>
    </oj-validation-group>
  </div>

  <div slot="footer" style="display:flex; justify-content:flex-end; margin-top:1rem;">

    <oj-button id="attachment-save-add" chroming="outlined" label="Save & Add"
      style="margin-left:0.5%;margin-right:0.5%;" on-oj-action="[[$listeners.attachmentSaveAddAction]]">
      <span class="oj-ux-ico-save" slot="startIcon" style="color: white;"></span>
    </oj-button>

    <oj-button id="attachment-save-close" chroming="outlined" label="Save & Close"
      style="margin-left:0.5%;margin-right:0.5%;" on-oj-action="[[$listeners.attachmentSaveCloseAction2]]">
      <span class="oj-ux-ico-save" slot="startIcon" style="color: white;"></span>
    </oj-button>

    <oj-button id="attachment-cancel" chroming="outlined" label="Cancel" style="margin-left:0.5%;margin-right:0.5%;"
      on-oj-action="[[$listeners.attachmentCancelAction]]">
      <span class="oj-ux-ico-cancel-s" slot="startIcon" style="color: white;"></span>
    </oj-button>
  </div>
</oj-dialog>

<!-- Delete Confirmation Dialog -->
<oj-dialog dialog-title="Delete" id="deleteDialog" cancel-behavior="icon" modality="modal" resize-behavior="none"
  style="width: 400px;" position.at.vertical="top" position.my.vertical="top">
  <div slot="body">
    <div style="padding: 1rem; text-align: center;">
      <!-- Warning Icon -->
      <div style="margin-bottom: 1rem;">
        <span class="oj-ux-ico-warning" style="font-size: 3rem; color: #ff6b35;"></span>
      </div>
      <!-- Confirmation Message -->
      <div style="margin-bottom: 1rem;">
        <h4 style="color: #333; margin: 0 0 0.5rem 0;">Are you sure?</h4>
        <p style="color: #666; margin: 0; line-height: 1.4;">
          Do you want to delete this attachment? This action cannot be undone.
        </p>
      </div>
    </div>
  </div>
  <div slot="footer" style="display: flex; justify-content: end; gap: 0.5rem; padding: 1rem;">
    <!-- Delete Button (Danger Style) -->
    <oj-button id="confirmDeleteBtn" chroming="danger" label="Yes, Delete" style="min-width: 120px;"
      on-oj-action="[[$listeners.confirmDeleteBtnAction]]">
      <span class="oj-ux-ico-delete" slot="startIcon"></span>
    </oj-button>
    <!-- Cancel Button -->
    <oj-button id="cancelDeleteBtn" chroming="outlined" label="Cancel" style="min-width: 120px;"
      on-oj-action="[[$listeners.cancelDeleteBtnAction]]">
      <span class="oj-ux-ico-cancel" slot="startIcon"></span>
    </oj-button>
  </div>
</oj-dialog>
